# GitHub Actions: 发布 z-util 到 GitHub Packages
#
# 触发条件：
#   - push main 或 master
#   - 创建 v*.*.* tag
#   - 手动触发 (workflow_dispatch)
#
# 所需 Secret（在 GitHub repo → Settings → Secrets and variables → Actions）：
#   - MAVEN_GITHUB_TOKEN：GitHub PAT，至少需要 write:packages 权限
name: Publish to GitHub Packages

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

# GitHub 2023+ 默认 GITHUB_TOKEN 是 read-only，写 Packages 必须显式开 packages: write
permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build (skip tests for speed on PR-style push)
        run: mvn -B -DskipTests=true clean install

      - name: Write Maven settings.xml (GitHub Packages auth)
        env:
          MAVEN_GITHUB_TOKEN: ${{ secrets.MAVEN_GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>yuku123</username>
                <password>${MAVEN_GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish to GitHub Packages
        run: mvn -B -DskipTests=true deploy
        env:
          MAVEN_GITHUB_TOKEN: ${{ secrets.MAVEN_GITHUB_TOKEN }}

      - name: Build success notification
        if: success()
        run: echo "✅ Published z-util to https://maven.pkg.github.com/yuku123/z-maven-repo"
